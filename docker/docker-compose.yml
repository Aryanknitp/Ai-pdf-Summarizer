version: "3.9"

services:
  nextjs:
    build:
      context: ..
      dockerfile: docker/nextjs.Dockerfile
    ports:
      - "3000:3000"
    restart: always

  python-ai:
    build:
      context: ../python-ai
      dockerfile: ../docker/python.Dockerfile
    ports:
      - "8000:8000"
    restart: always